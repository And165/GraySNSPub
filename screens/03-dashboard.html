<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GraySNS dashboard</title>
  <style>
    :root {
      --bg: oklch(98% 0.004 240);
      --surface: oklch(100% 0 0);
      --fg: oklch(18% 0.012 250);
      --muted: oklch(54% 0.012 250);
      --border: oklch(91% 0.006 250);
      --accent: oklch(58% 0.18 255);
      --success: oklch(64% 0.12 170);
      --warning: oklch(76% 0.14 82);
      --soft: color-mix(in oklch, var(--fg) 5%, transparent);
      --accent-soft: color-mix(in oklch, var(--accent) 12%, transparent);
      --success-soft: color-mix(in oklch, var(--success) 18%, transparent);
      --warning-soft: color-mix(in oklch, var(--warning) 18%, transparent);
      --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }
    button, a { font: inherit; color: inherit; }
    button { cursor: pointer; }
    a { text-decoration: none; }
    h1, h2, h3, p { margin: 0; }
    h1, h2, h3 { font-family: var(--font-display); letter-spacing: 0; }
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 18px 16px 18px;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 44px;
      margin-bottom: 8px;
    }
    .brand { font-size: 18px; font-weight: 850; }
    .icon-btn {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-weight: 900;
    }
    .summary {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--surface);
      box-shadow: 0 18px 50px color-mix(in oklch, var(--fg) 7%, transparent);
    }
    .summary-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .summary h1 { font-size: 32px; line-height: 1.05; }
    .summary p { margin-top: 8px; color: var(--muted); font-size: 14px; line-height: 1.5; }
    .shield {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: var(--success-soft);
      color: var(--fg);
      font-weight: 950;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 16px;
    }
    .status {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--bg);
    }
    .status span { color: var(--muted); font-size: 12px; }
    .status strong {
      display: block;
      margin-top: 4px;
      font-family: var(--font-mono);
      font-size: 17px;
      font-variant-numeric: tabular-nums;
    }
    .usage {
      margin-top: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
    }
    .usage-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 14px;
    }
    .usage h2 { font-size: 20px; }
    .saved {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 900;
      color: var(--fg);
    }
    .bars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      height: 188px;
      align-items: end;
      padding-top: 10px;
    }
    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: end;
      gap: 9px;
      min-width: 0;
    }
    .bar-value {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }
    .bar {
      width: 100%;
      max-width: 92px;
      border-radius: 18px 18px 10px 10px;
      background: var(--warning-soft);
      border: 1px solid color-mix(in oklch, var(--warning) 28%, var(--border));
    }
    .bar.now {
      background: var(--success-soft);
      border-color: color-mix(in oklch, var(--success) 30%, var(--border));
    }
    .bar-label { color: var(--muted); font-size: 12px; font-weight: 750; }
    .note { margin-top: 12px; color: var(--muted); font-size: 11px; line-height: 1.45; }
    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .action {
      min-height: 50px;
      border-radius: 17px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-weight: 850;
    }
    .action.primary { background: var(--accent); border-color: var(--accent); color: var(--surface); }
    .action.wide { grid-column: 1 / -1; }
    .bottom-nav {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: auto;
      padding-top: 14px;
    }
    .tab {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 44px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .tab.active { color: var(--fg); background: var(--soft); }
    .sheet {
      position: fixed;
      inset: auto 10px 10px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: 0 24px 80px color-mix(in oklch, var(--fg) 18%, transparent);
      transform: translateY(120%);
      transition: transform 0.22s ease;
    }
    .sheet.open { transform: translateY(0); }
    .sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .app-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }
    .app-row:first-of-type { border-top: 0; }
    .close {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="nav">
      <span class="brand">GraySNS</span>
      <button class="icon-btn" type="button" id="openSheet" aria-label="Targets">対象</button>
    </header>

    <section class="summary" data-od-id="dashboard-summary">
      <div class="summary-top">
        <div>
          <h1>低刺激モード</h1>
          <p id="summaryCopy">3件のSNSをフィルター中。自動再シールドも確認済みです。</p>
        </div>
        <span class="shield" id="shieldIcon">ON</span>
      </div>
      <div class="status-grid">
        <div class="status">
          <span>シールド</span>
          <strong id="shieldStatus">ON</strong>
        </div>
        <div class="status">
          <span>自動再シールド</span>
          <strong>確認済み</strong>
        </div>
      </div>
    </section>

    <section class="usage" data-od-id="weekly-usage">
      <div class="usage-head">
        <div>
          <h2>一週間の利用時間</h2>
          <p class="note" style="margin-top: 2px;">ビフォーアフター</p>
        </div>
        <span class="saved">-3h14m</span>
      </div>
      <div class="bars" aria-label="Weekly usage bars">
        <div class="bar-col">
          <span class="bar-value">8h32m</span>
          <span class="bar" style="height: 132px;"></span>
          <span class="bar-label">導入前</span>
        </div>
        <div class="bar-col">
          <span class="bar-value">5h18m</span>
          <span class="bar now" style="height: 82px;"></span>
          <span class="bar-label">今週</span>
        </div>
      </div>
      <p class="note">表示値は現行ContentViewのWeeklyUsageCardにある画面確認用データを使っています。</p>
    </section>

    <section class="actions" data-od-id="dashboard-actions">
      <button class="action primary" type="button" id="toggleShield">ONを維持</button>
      <button class="action" type="button" id="targetButton">対象変更</button>
      <a class="action wide" href="02-automation-guide.html" style="display: flex; align-items: center; justify-content: center;">自動再シールド設定を確認</a>
      <button class="action wide" type="button" id="proButton">Proを確認</button>
    </section>

    <nav class="bottom-nav" aria-label="App navigation">
      <span class="tab active">利用時間</span>
      <a class="tab" href="01-setup-start.html">対象</a>
      <a class="tab" href="02-automation-guide.html">自動化</a>
    </nav>
  </main>

  <aside class="sheet" id="sheet" aria-label="Selected applications">
    <div class="sheet-head">
      <h3>フィルター対象</h3>
      <button class="close" type="button" id="closeSheet" aria-label="Close">×</button>
    </div>
    <div id="sheetBody">
      <div class="app-row"><strong>Instagram</strong><span>ON</span></div>
      <div class="app-row"><strong>X</strong><span>ON</span></div>
      <div class="app-row"><strong>TikTok</strong><span>ON</span></div>
    </div>
  </aside>

  <script>
    const sheet = document.getElementById("sheet");
    const sheetTitle = sheet.querySelector("h3");
    const sheetBody = document.getElementById("sheetBody");
    const targetRows = `<div class="app-row"><strong>Instagram</strong><span>ON</span></div><div class="app-row"><strong>X</strong><span>ON</span></div><div class="app-row"><strong>TikTok</strong><span>ON</span></div>`;
    const proRows = `<div class="app-row"><strong>GraySNS Pro</strong><span>月150円</span></div><div class="app-row"><strong>無料トライアル</strong><span>1週間</span></div><div class="app-row"><strong>StoreKit</strong><span>確認画面へ</span></div>`;
    const openTargetSheet = () => {
      sheetTitle.textContent = "フィルター対象";
      sheetBody.innerHTML = targetRows;
      sheet.classList.add("open");
    };
    const openProSheet = () => {
      sheetTitle.textContent = "Proを確認";
      sheetBody.innerHTML = proRows;
      sheet.classList.add("open");
    };
    const closeSheet = () => sheet.classList.remove("open");
    document.getElementById("openSheet").addEventListener("click", openTargetSheet);
    document.getElementById("targetButton").addEventListener("click", openTargetSheet);
    document.getElementById("closeSheet").addEventListener("click", closeSheet);

    let shieldOn = true;
    const toggle = document.getElementById("toggleShield");
    const shieldStatus = document.getElementById("shieldStatus");
    const shieldIcon = document.getElementById("shieldIcon");
    const summaryCopy = document.getElementById("summaryCopy");
    toggle.addEventListener("click", () => {
      shieldOn = !shieldOn;
      shieldStatus.textContent = shieldOn ? "ON" : "OFF";
      shieldIcon.textContent = shieldOn ? "ON" : "OFF";
      toggle.textContent = shieldOn ? "ONを維持" : "シールドをON";
      summaryCopy.textContent = shieldOn ? "3件のSNSをフィルター中。自動再シールドも確認済みです。" : "シールドは一時的にOFFです。必要な時にすぐ戻せます。";
    });

    document.getElementById("proButton").addEventListener("click", openProSheet);
  </script>
</body>
</html>
